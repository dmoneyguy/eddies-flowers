# GitHub Actions deployment workflow for Eddie's Flowers → Vercel
# Uses the Vercel CLI directly (not the Vercel GitHub integration) to bypass
# the commit-author check that blocks deploys via the native integration.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN      — Vercel API token (project-scoped or user token)
#   VERCEL_ORG_ID     — Vercel team/org ID  (team_C2MTOGwrC3jHRm9HlY5w7sCE)
#   VERCEL_PROJECT_ID — Vercel project ID   (prj_joEKzBfdUg38RCMhdIdJZ7q7s1d9)

name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pull Vercel project config
        run: npx vercel pull --yes --environment=production --token=$VERCEL_TOKEN

      - name: Build project
        run: npx vercel build --prod --token=$VERCEL_TOKEN

      - name: Deploy to Vercel (production)
        run: npx vercel deploy --prebuilt --prod --token=$VERCEL_TOKEN
